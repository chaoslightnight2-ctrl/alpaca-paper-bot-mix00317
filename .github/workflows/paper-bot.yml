name: Alpaca Paper Bot
run-name: Alpaca Paper Bot / ${{ github.event_name }} / ${{ github.event.schedule || inputs.run_type || 'manual' }}

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "dry_run logs signals only; execute sends Alpaca paper orders"
        required: true
        default: "dry_run"
        type: choice
        options:
          - dry_run
          - execute
      max_minutes:
        description: "How long to keep the bot loop alive. Leave default unless manually testing."
        required: true
        default: "0"
      run_type:
        description: "auto_window checks entry and exits; entry_window opens new trades; close_due closes due bot trades"
        required: true
        default: "auto_window"
        type: choice
        options:
          - auto_window
          - entry_window
          - close_due
  schedule:
    # GitHub scheduled jobs are best-effort and can be delayed or dropped under load.
    # GitHub documents the start of each hour as high-load time, so avoid :00-:03.
    # Use Europe/Istanbul because operations are monitored in Turkey time.
    # Day guard: 13:00-19:00 TR, weekdays. Last trigger is 18:54 and runs 4 min.
    - cron: "4,9,14,19,24,29,34,39,44,49,54 13-18 * * 1-5"
      timezone: "Europe/Istanbul"
    # Night guard: 23:00-05:00 TR. It crosses midnight, so split weekdays:
    # 23:04-23:54 Monday-Friday, then 00:04-04:54 Tuesday-Saturday.
    - cron: "4,9,14,19,24,29,34,39,44,49,54 23 * * 1-5"
      timezone: "Europe/Istanbul"
    - cron: "4,9,14,19,24,29,34,39,44,49,54 0-4 * * 2-6"
      timezone: "Europe/Istanbul"

concurrency:
  group: alpaca-paper-bot
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  paper-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    env:
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
      ALPACA_DATA_FEED: iex
      PAPER_BOT_HEARTBEAT_START_URL: ${{ secrets.PAPER_BOT_HEARTBEAT_START_URL }}
      PAPER_BOT_HEARTBEAT_SUCCESS_URL: ${{ secrets.PAPER_BOT_HEARTBEAT_SUCCESS_URL }}
      PAPER_BOT_HEARTBEAT_FAILURE_URL: ${{ secrets.PAPER_BOT_HEARTBEAT_FAILURE_URL }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Optional heartbeat start
        if: env.PAPER_BOT_HEARTBEAT_START_URL != ''
        run: curl --fail --silent --show-error --max-time 10 "$PAPER_BOT_HEARTBEAT_START_URL"

      - name: Validate config and code
        run: |
          python -m py_compile paper_bot.py dashboard.py
          python - <<'PY'
          import json
          from pathlib import Path
          cfg = json.loads(Path("strategy_config.json").read_text())
          assert cfg["trading"]["paper_base_url"] == "https://paper-api.alpaca.markets"
          assert cfg["trading"].get("paper_only") is True
          assert cfg["trading"].get("live_trading_enabled") is False
          assert float(cfg["trading"]["max_total_gross_exposure"]) <= 2.0
          print("config ok:", cfg["strategy_name"])
          PY

      - name: Run paper bot window
        shell: bash
        run: |
          MODE="${{ github.event.inputs.mode || '' }}"
          MAX_MINUTES="${{ github.event.inputs.max_minutes || '0' }}"
          RUN_TYPE="${{ github.event.inputs.run_type || '' }}"
          SCHEDULE="${{ github.event.schedule || '' }}"

          if [ -z "$MODE" ]; then
            if [ "${{ vars.PAPER_BOT_SCHEDULE_EXECUTE || 'false' }}" = "true" ]; then
              MODE="execute"
            else
              MODE="dry_run"
            fi
          fi

          if [ -z "$RUN_TYPE" ]; then
            RUN_TYPE="auto_window"
          fi

          if [ "$MAX_MINUTES" = "0" ]; then
            if [ "$RUN_TYPE" = "auto_window" ]; then
              case "$SCHEDULE" in
                "4,9,14,19,24,29,34,39,44,49,54 13-18 * * 1-5"|"4,9,14,19,24,29,34,39,44,49,54 23 * * 1-5"|"4,9,14,19,24,29,34,39,44,49,54 0-4 * * 2-6")
                  MAX_MINUTES="4"
                  ;;
                *)
                  MAX_MINUTES="8"
                  ;;
              esac
            else
              MAX_MINUTES="1"
            fi
          fi

          if [ "$MODE" = "execute" ]; then
            EXEC_FLAG="--execute"
          else
            EXEC_FLAG="--dry-run"
          fi

          echo "mode=$MODE run_type=$RUN_TYPE schedule=$SCHEDULE max_minutes=$MAX_MINUTES"
          echo "event_name=${{ github.event_name }} run_id=${{ github.run_id }} run_attempt=${{ github.run_attempt }}"

          if [ "$RUN_TYPE" = "auto_window" ]; then
            python paper_bot.py $EXEC_FLAG --auto-window --loop --max-minutes "$MAX_MINUTES" --sleep-seconds 10
          elif [ "$RUN_TYPE" = "close_due" ]; then
            if [ "$MAX_MINUTES" = "1" ]; then
              python paper_bot.py $EXEC_FLAG --close-due-from-broker
            else
              python paper_bot.py $EXEC_FLAG --close-due-from-broker --loop --max-minutes "$MAX_MINUTES" --sleep-seconds 10
            fi
          else
            python paper_bot.py $EXEC_FLAG --loop --max-minutes "$MAX_MINUTES" --sleep-seconds 10
          fi

      - name: Upload bot logs and state
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: paper-bot-runtime
          path: |
            logs/
            state/
          if-no-files-found: ignore

      - name: Optional heartbeat success
        if: success() && env.PAPER_BOT_HEARTBEAT_SUCCESS_URL != ''
        run: curl --fail --silent --show-error --max-time 10 "$PAPER_BOT_HEARTBEAT_SUCCESS_URL"

      - name: Optional heartbeat failure
        if: failure() && env.PAPER_BOT_HEARTBEAT_FAILURE_URL != ''
        run: curl --fail --silent --show-error --max-time 10 "$PAPER_BOT_HEARTBEAT_FAILURE_URL"
